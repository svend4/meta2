name: CI

on:
  push:
    branches: ["main", "master", "claude/**"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: ["ubuntu-latest"]
        # Windows/macOS можно добавить при необходимости:
        # os: ["ubuntu-latest", "macos-latest"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # Системные зависимости для OpenCV
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Опциональные зависимости для тестов
          pip install scikit-learn scipy || true

      - name: Lint with ruff
        run: |
          ruff check puzzle_reconstruction/ tools/ --ignore E501,F401,N803,N806,UP006,UP007,UP035,RUF012

      - name: Run unit tests (fast)
        run: |
          pytest tests/ \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_pipeline.py \
            -v --tb=short -q \
            --timeout=60 \
            -x
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py tests/test_pipeline.py \
            -v --tb=short -q \
            --timeout=120 \
            -m "not slow"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Coverage report
        run: |
          pip install pytest-cov
          pytest tests/ \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_pipeline.py \
            --cov=puzzle_reconstruction \
            --cov-report=term-missing \
            --cov-report=xml \
            -q --timeout=60
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11' && runner.os == 'Linux'
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ── Линт без тестов (быстро) ────────────────────────────────────────────
  lint:
    name: "Lint & type check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff mypy types-Pillow numpy

      - name: ruff check
        run: |
          ruff check puzzle_reconstruction/ tools/ \
            --ignore E501,F401,N803,N806,UP006,UP007,UP035,RUF012,W291

      - name: mypy check (core + new modules)
        run: |
          mypy \
            puzzle_reconstruction/config.py \
            puzzle_reconstruction/models.py \
            puzzle_reconstruction/clustering.py \
            puzzle_reconstruction/export.py \
            puzzle_reconstruction/pipeline.py \
            puzzle_reconstruction/algorithms/synthesis.py \
            puzzle_reconstruction/algorithms/fractal/box_counting.py \
            puzzle_reconstruction/algorithms/fractal/css.py \
            puzzle_reconstruction/algorithms/fractal/divider.py \
            puzzle_reconstruction/algorithms/fractal/ifs.py \
            puzzle_reconstruction/algorithms/wavelet_descriptor.py \
            puzzle_reconstruction/algorithms/tangram/hull.py \
            puzzle_reconstruction/matching/pairwise.py \
            puzzle_reconstruction/matching/compat_matrix.py \
            puzzle_reconstruction/matching/matcher_registry.py \
            puzzle_reconstruction/matching/rotation_dtw.py \
            puzzle_reconstruction/matching/text_flow.py \
            puzzle_reconstruction/assembly/astar.py \
            puzzle_reconstruction/assembly/hierarchical.py \
            puzzle_reconstruction/verification/homography_verifier.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --check-untyped-defs
        continue-on-error: true   # предупреждения не блокируют, ошибки — блокируют

  # ── Бенчмарки (опциональные, только на ubuntu) ───────────────────────────
  benchmarks:
    name: "Benchmarks (smoke test)"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install scikit-learn scipy || true

      - name: Run benchmark smoke tests
        run: |
          python -m pytest benchmarks/bench_descriptors.py \
            benchmarks/bench_compat_matrix.py \
            benchmarks/bench_assembly_methods.py \
            -q --tb=short -x \
            --timeout=120
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true   # benchmarks are informational, not blocking

  # ── Сборка пакета ───────────────────────────────────────────────────────
  build:
    name: "Build distribution"
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build wheel

      - name: Build wheel and sdist
        run: python -m build

      - name: Check dist contents
        run: |
          ls -lh dist/
          pip install twine
          twine check dist/*
